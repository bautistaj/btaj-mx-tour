<meta name="mobile-web-app-capable" content="yes">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050508;touch-action:none;-webkit-tap-highlight-color:transparent;font-family:'Arial',sans-serif}
#c{position:fixed;inset:0;width:100%;height:100%;display:block}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;z-index:300;background:#050508;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
#splash-logo{font-family:'Arial Black',sans-serif;font-size:58px;letter-spacing:8px;
  color:#fff;text-shadow:0 0 80px #e8321f}
#splash-logo em{color:#e8321f;font-style:normal}
#splash-sub{font-size:10px;letter-spacing:6px;color:#ffffff22;margin-bottom:24px}
#splash-bar-wrap{width:220px;height:3px;background:#1a1c23;border-radius:2px;overflow:hidden}
#splash-bar{height:100%;width:0%;background:#e8321f;border-radius:2px;transition:width .2s}
#splash-status{font-size:10px;letter-spacing:2px;color:#ffffff33;margin-top:10px}
#splash.out{animation:fadeOut .7s forwards}
@keyframes fadeOut{to{opacity:0;pointer-events:none}}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;right:0;padding:14px 18px 20px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:20;pointer-events:none;
  background:linear-gradient(to bottom,#00000099,transparent)}
#logo{font-family:'Arial Black',sans-serif;font-size:22px;letter-spacing:5px;
  color:#fff;text-shadow:0 0 20px #e8321f}
#logo em{color:#e8321f;font-style:normal}
#counter{background:#00000099;border:1px solid #e8321f66;border-radius:4px;
  padding:4px 12px;font-size:12px;font-weight:700;letter-spacing:2px;color:#e8321f}

/* ── HINT ── */
#hint{position:fixed;top:62px;left:50%;transform:translateX(-50%);
  background:#00000088;border:1px solid #ffffff11;border-radius:100px;
  padding:6px 16px;font-size:10px;color:#ffffff33;letter-spacing:1px;
  z-index:20;pointer-events:none;transition:opacity .5s;white-space:nowrap}

/* ── JOYSTICKS ── */
#joy-wrap{position:fixed;bottom:24px;left:20px;z-index:30;touch-action:none;user-select:none}
#joy-base{width:130px;height:130px;border-radius:50%;
  background:rgba(232,50,31,.06);
  border:2px solid rgba(232,50,31,.25);
  box-shadow:0 0 0 1px rgba(232,50,31,.08),inset 0 0 30px rgba(0,0,0,.3);
  position:relative;transition:background .15s}
#joy-base.pressed{background:rgba(232,50,31,.14)}
#joy-knob{width:52px;height:52px;border-radius:50%;z-index:2;
  background:radial-gradient(circle at 35% 35%,#ff5544,#a01f10);
  box-shadow:0 0 16px #e8321f55, 0 3px 8px #00000066;
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none}

/* Cross guides via SVG inline */
/* Flechas direccionales SVG dentro de los joysticks */
.joy-arrows{position:absolute;inset:0;pointer-events:none;opacity:.35}
.joy-arrows.red .arr-line{stroke:#e8321f}
.joy-arrows.blue .arr-line{stroke:#4488cc}
/* Punto central de reposo */
.joy-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:6px;height:6px;border-radius:50%;pointer-events:none}
.joy-center.red{background:#e8321f55}
.joy-center.blue{background:#4488cc55}
/* Labels */
#joy-label{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);
  font-size:10px;letter-spacing:2px;color:#e8321faa;white-space:nowrap;text-transform:uppercase;font-weight:700}

#camjoy-wrap{position:fixed;bottom:24px;right:20px;z-index:30;touch-action:none;user-select:none}
#camjoy-base{width:130px;height:130px;border-radius:50%;
  background:rgba(68,136,204,.05);
  border:2px solid rgba(68,136,204,.22);
  box-shadow:0 0 0 1px rgba(68,136,204,.07),inset 0 0 30px rgba(0,0,0,.3);
  position:relative;transition:background .15s}
#camjoy-base.pressed{background:rgba(68,136,204,.13)}
#camjoy-knob{width:52px;height:52px;border-radius:50%;z-index:2;
  background:radial-gradient(circle at 35% 35%,#5599ee,#1a3a70);
  box-shadow:0 0 14px #4488cc55, 0 3px 8px #00000066;
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none}

#camjoy-label{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);
  font-size:10px;letter-spacing:2px;color:#4488ccaa;white-space:nowrap;text-transform:uppercase;font-weight:700}

/* ── INTERACT ── */
#interact-btn{position:fixed;bottom:160px;left:50%;transform:translateX(-50%);
  z-index:30;background:linear-gradient(135deg,#e8321f,#a01f10);
  color:#fff;border:none;border-radius:8px;
  padding:12px 26px;font-size:14px;font-weight:700;letter-spacing:2px;
  cursor:pointer;display:none;white-space:nowrap;
  box-shadow:0 0 20px #e8321f55,0 4px 16px #00000088;
  animation:ibpulse 1.8s infinite}
@keyframes ibpulse{0%,100%{box-shadow:0 0 20px #e8321f55,0 4px 16px #00000088}
  50%{box-shadow:0 0 34px #e8321f99,0 4px 16px #00000088}}

/* ── MINIMAP ── */
#minimap{position:fixed;top:66px;right:16px;width:96px;height:96px;
  border-radius:8px;border:1.5px solid #3a3d55;
  background:#08090e;overflow:hidden;z-index:20;
  box-shadow:0 0 0 1px #4488cc22, 0 4px 16px #00000088}
#minimap-title{position:absolute;top:4px;left:0;right:0;
  text-align:center;font-size:7px;letter-spacing:2px;color:#4488cc66;
  font-weight:700;z-index:1;pointer-events:none}
#minimap-border{position:absolute;inset:0;border-radius:7px;
  border:1px solid #4488cc18;pointer-events:none;z-index:2}

/* ── MODAL — medium bottom sheet ── */
#modal{position:fixed;inset:0;z-index:100;display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity .28s}
#modal.open{opacity:1;pointer-events:all}
#modal-bg{position:absolute;inset:0;background:#00000077;backdrop-filter:blur(6px)}
#modal-card{position:relative;z-index:1;width:100%;height:54vh;
  background:linear-gradient(170deg,#161820 0%,#111318 100%);
  border-top:1.5px solid #e8321f;border-radius:18px 18px 0 0;
  display:flex;flex-direction:row;overflow:hidden;
  transform:translateY(100%);transition:transform .36s cubic-bezier(.32,.72,0,1)}
#modal.open #modal-card{transform:translateY(0)}
/* Imagen izquierda */
#modal-left{width:42%;height:100%;flex-shrink:0;position:relative;overflow:hidden}
#modal-img{width:100%;height:100%;object-fit:cover;display:block}
#modal-fallback{width:100%;height:100%;display:none;align-items:center;
  justify-content:center;font-size:80px;background:#1a1c23}
#modal-series-tag{position:absolute;top:12px;left:12px;
  background:#e8321f;color:#fff;font-size:10px;font-weight:700;
  letter-spacing:1.5px;padding:3px 9px;border-radius:3px}
#modal-views-tag{position:absolute;bottom:10px;right:8px;
  background:#00000099;color:#ffffff77;font-size:10px;padding:3px 8px;border-radius:3px}
/* Contenido derecho */
#modal-right{flex:1;display:flex;flex-direction:column;
  padding:16px 16px 20px;overflow:hidden;gap:8px}
#modal-handle{width:32px;height:3px;background:#2a2d3a;border-radius:2px;
  align-self:center;flex-shrink:0}
#modal-title{font-size:20px;font-weight:900;letter-spacing:1.5px;
  color:#fff;line-height:1.1}
#modal-series-pill{display:inline-block;background:#e8321f22;
  border:1px solid #e8321f44;border-radius:100px;
  padding:3px 12px;font-size:10px;font-weight:700;
  letter-spacing:2px;color:#e8321fcc;align-self:flex-start}
#modal-desc{font-size:12px;color:#ffffff55;line-height:1.6;flex:1;
  display:-webkit-box;-webkit-line-clamp:4;
  -webkit-box-orient:vertical;overflow:hidden}
#modal-actions{display:flex;gap:8px;margin-top:auto}
.btn-share{flex:1;padding:11px 0;border-radius:8px;border:none;
  background:linear-gradient(135deg,#e8321f,#a01f10);
  color:#fff;font-size:12px;font-weight:700;letter-spacing:1.5px;cursor:pointer}
.btn-follow{flex:1;padding:11px 0;border-radius:8px;border:none;
  background:linear-gradient(135deg,#f09433,#dc2743,#bc1888);
  color:#fff;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer}
.btn-close{width:40px;padding:11px 0;border-radius:8px;
  border:1px solid #2a2d3a;background:transparent;
  color:#ffffff33;font-size:14px;cursor:pointer;flex-shrink:0}

/* ── GALERÍA ── */
#gallery-btn{position:fixed;top:68px;left:16px;z-index:20;
  background:#00000099;border:1px solid #2a2d3a;border-radius:6px;
  padding:6px 12px;font-size:11px;font-weight:700;letter-spacing:1px;
  color:#ffffff66;cursor:pointer}
#gallery{position:fixed;inset:0;z-index:150;background:#050508ee;
  display:none;flex-direction:column;overflow:hidden}
#gallery.open{display:flex}
#gallery-header{padding:18px 20px 14px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid #1e2030}
#gallery-title{font-family:'Arial Black',sans-serif;font-size:20px;letter-spacing:3px;color:#fff}
#gallery-close{background:transparent;border:1px solid #2a2d3a;color:#ffffff55;
  border-radius:6px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer}
#gallery-grid{flex:1;overflow-y:auto;padding:16px;
  display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.g-card{border-radius:10px;overflow:hidden;position:relative;aspect-ratio:3/4;
  cursor:pointer;border:1px solid #1e2030;transition:transform .15s}
.g-card:active{transform:scale(.97)}
.g-card img{width:100%;height:100%;object-fit:cover;display:block}
.g-card-fallback{width:100%;height:100%;display:flex;align-items:center;
  justify-content:center;font-size:48px}
.g-card-info{position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,#000000cc);
  padding:20px 10px 10px}
.g-card-title{font-size:13px;font-weight:700;color:#fff;letter-spacing:1px}
.g-card-series{font-size:10px;color:#ffffff55;margin-top:2px}
.g-card-seen{position:absolute;top:8px;right:8px;width:8px;height:8px;
  border-radius:50%;background:#e8321f;display:none}
.g-card.seen .g-card-seen{display:block}

/* ── TUTORIAL ── */
#tutorial{position:fixed;inset:0;z-index:90;display:flex;align-items:center;justify-content:center;
  background:#000000bb;backdrop-filter:blur(4px);transition:opacity .4s}
#tutorial.hide{opacity:0;pointer-events:none}
#tut-card{background:#12131a;border:1px solid #2a2d3a;border-radius:20px;
  padding:28px 24px 24px;width:88%;max-width:340px;text-align:center}
#tut-title{font-family:'Arial Black',sans-serif;font-size:16px;letter-spacing:3px;
  color:#fff;margin-bottom:6px}
#tut-title em{color:#e8321f;font-style:normal}
#tut-sub{font-size:11px;color:#ffffff44;letter-spacing:2px;margin-bottom:24px}
#tut-controls{display:flex;justify-content:center;gap:28px;margin-bottom:24px}
.tut-joy{display:flex;flex-direction:column;align-items:center;gap:10px}
.tut-circle{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:28px;position:relative}
.tut-circle.red{background:rgba(232,50,31,.1);border:2px solid rgba(232,50,31,.4)}
.tut-circle.blue{background:rgba(68,136,204,.1);border:2px solid rgba(68,136,204,.35)}
.tut-arrow{position:absolute;font-size:11px;opacity:.6}
.tut-arrow.up{top:5px;left:50%;transform:translateX(-50%)}
.tut-arrow.dn{bottom:5px;left:50%;transform:translateX(-50%)}
.tut-arrow.lt{left:5px;top:50%;transform:translateY(-50%)}
.tut-arrow.rt{right:5px;top:50%;transform:translateY(-50%)}
.tut-name{font-size:11px;font-weight:700;letter-spacing:2px}
.tut-name.red{color:#e8321f}
.tut-name.blue{color:#4488cc}
.tut-desc{font-size:11px;color:#ffffff44;margin-top:2px}
#tut-divider{width:1px;height:72px;background:#2a2d3a;align-self:center}
#tut-btn{width:100%;padding:13px;border-radius:8px;border:none;
  background:linear-gradient(135deg,#e8321f,#a01f10);
  color:#fff;font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer}
#tut-skip{font-size:10px;color:#ffffff22;margin-top:10px;cursor:pointer;letter-spacing:1px}

/* ── INSTAGRAM PANEL ── */
#modal-ig{border-top:1px solid #1e2030;padding:14px 16px 0;margin-top:4px}
#modal-ig-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
#modal-ig-logo{width:22px;height:22px;border-radius:6px;
  background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
  display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
#modal-ig-handle{font-size:11px;font-weight:700;color:#ffffff66;letter-spacing:1px}
#modal-ig-badge{margin-left:auto;font-size:9px;letter-spacing:1px;
  background:#1e2030;border:1px solid #2a2d3a;color:#ffffff33;
  padding:2px 8px;border-radius:100px}
#modal-ig-badge.live{border-color:#1e8449;color:#2ecc71}
#modal-ig-stats{display:flex;gap:10px;margin-bottom:14px}
.ig-stat{flex:1;background:#0e0f16;border:1px solid #1a1c26;border-radius:8px;
  padding:8px 6px;text-align:center}
.ig-stat-val{font-family:'Arial Black',sans-serif;font-size:16px;
  color:#fff;letter-spacing:-0.5px;line-height:1}
.ig-stat-lbl{font-size:9px;color:#ffffff33;letter-spacing:1px;
  margin-top:3px;text-transform:uppercase}
.ig-stat.likes .ig-stat-val{color:#e8321f}
.ig-stat.reach .ig-stat-val{color:#f5a500}
#modal-ig-actions{display:flex;gap:8px;padding-bottom:4px}
#btn-ig-open{flex:1;padding:11px;border-radius:7px;border:none;
  background:linear-gradient(135deg,#f09433,#dc2743,#bc1888);
  color:#fff;font-size:12px;font-weight:700;letter-spacing:1.5px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px}
#btn-ig-share{padding:11px 14px;border-radius:7px;border:1px solid #2a2d3a;
  background:transparent;color:#ffffff44;font-size:12px;font-weight:700;
  letter-spacing:1px;cursor:pointer}
.ig-demo-tag{text-align:center;font-size:9px;color:#ffffff18;
  letter-spacing:1px;margin-top:8px;padding-bottom:8px}

/* ── SOCIAL ACTIONS ── */
#modal-social{padding:14px 16px 16px;display:flex;flex-direction:column;gap:10px}

/* Botón principal — Compartir */
#btn-share-main{width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#e8321f,#a01f10);
  color:#fff;font-size:13px;font-weight:700;letter-spacing:2px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 16px #e8321f33}

/* Fila de acciones secundarias */
#social-row{display:flex;gap:8px}

/* Botón seguir Instagram */
#btn-follow{flex:1;padding:11px 8px;border-radius:10px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);
  color:#fff;font-size:11px;font-weight:700;letter-spacing:1px;
  display:flex;align-items:center;justify-content:center;gap:6px}

/* Botón like interno */
#btn-like{width:52px;height:44px;border-radius:10px;cursor:pointer;
  border:1.5px solid #2a2d3a;background:#0e0f16;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  transition:all .2s;flex-shrink:0}
#btn-like.liked{border-color:#e8321f44;background:#e8321f11}
#btn-like-icon{font-size:16px;line-height:1;transition:transform .15s}
#btn-like.liked #btn-like-icon{transform:scale(1.25)}
#btn-like-count{font-size:8px;font-weight:700;color:#ffffff33;letter-spacing:.5px;line-height:1}
#btn-like.liked #btn-like-count{color:#e8321f}

/* Botón ver en Instagram (pequeño) */
#btn-ig-view{flex:1;padding:11px 8px;border-radius:10px;
  border:1.5px solid #2a2d3a;background:#0e0f16;
  color:#ffffff55;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px}

/* Stats de IG debajo */
#modal-ig-stats-row{display:flex;gap:8px}
.ig-mini-stat{flex:1;text-align:center;padding:8px 4px;
  background:#0a0b10;border:1px solid #1a1c26;border-radius:8px}
.ig-mini-val{font-size:15px;font-weight:900;color:#fff;letter-spacing:-0.5px;line-height:1}
.ig-mini-lbl{font-size:8px;color:#ffffff33;letter-spacing:1px;margin-top:2px;text-transform:uppercase}
.ig-mini-stat.likes .ig-mini-val{color:#e8321f}
.ig-mini-stat.reach .ig-mini-val{color:#f5a500}

#ig-source{text-align:center;font-size:9px;color:#ffffff15;letter-spacing:1px;
  margin-top:2px;padding-bottom:2px}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div id="splash-logo">BTAJ<em>MX</em></div>
  <div id="splash-sub">STREET TOUR 3D — @btaj_mx</div>
  <div id="splash-bar-wrap"><div id="splash-bar"></div></div>
  <div id="splash-status">CARGANDO BARRIO...</div>
  <div id="splash-ig" onclick="window.open('https://www.instagram.com/btaj_mx/','_blank')"

    letter-spacing:2px;color:#fff;opacity:.85">
    <span style="font-size:14px">📸</span> @btaj_mx en Instagram
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="logo" onclick="window.open('https://www.instagram.com/btaj_mx/','_blank')"

  <div style="display:flex;align-items:center;gap:8px">
    <div id="counter">0 / 8</div>
    <div id="hud-ig"
      onclick="window.open('https://www.instagram.com/btaj_mx/','_blank')"
      style="cursor:pointer;pointer-events:all;
      background:linear-gradient(135deg,#f09433,#dc2743,#bc1888);

    </div>
  </div>
</div>
<div id="hint">izq: caminar · der: cámara · acércate a un mural</div>

<!-- GALLERY BTN -->
<button id="gallery-btn" onclick="openGallery()">🖼 GALERÍA</button>

<!-- JOYSTICKS -->
<div id="joy-wrap">
  <div id="joy-base">
    <svg class="joy-arrows red" viewBox="0 0 130 130" xmlns="http://www.w3.org/2000/svg">
      <!-- Flecha arriba -->
      <polyline class="arr-line" points="65,18 58,30 65,24 72,30 65,18" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Flecha abajo -->
      <polyline class="arr-line" points="65,112 58,100 65,106 72,100 65,112" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Flecha izquierda -->
      <polyline class="arr-line" points="18,65 30,58 24,65 30,72 18,65" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Flecha derecha -->

// ── INSTAGRAM METRICS LOADER ──────────────────────────────────────────────────
async function loadIGMetrics() {
  if(IG_CONFIG.DEMO_MODE) {
    console.log('BTAJ: modo demo — usando métricas de ejemplo');
    return; // ya están en el array
  }
  try {
    const res = await fetch(IG_CONFIG.API_ENDPOINT);
    if(!res.ok) throw new Error('API error '+res.status);
    const data = await res.json(); // [{mediaId, likes, comments, reach}, ...]
    data.forEach(item => {
      const mural = MURALS.find(m => m.ig.mediaId === item.mediaId);
      if(mural) {
        mural.ig.likes    = item.likes;
        mural.ig.comments = item.comments;
        mural.ig.reach    = item.reach;
      }
    });
    console.log('BTAJ: métricas de Instagram cargadas ✓');
    // Actualizar modal si está abierto
    if(currentMural) openModal(currentMural);
  } catch(e) {
    console.warn('BTAJ: no se pudieron cargar métricas de IG →', e.message);
  }
}

function brickTex(base,v=16){
  const S=256,cv=document.createElement('canvas');cv.width=S;cv.height=S;
  const c=cv.getContext('2d');
  const r=parseInt(base.slice(1,3),16),g2=parseInt(base.slice(3,5),16),b=parseInt(base.slice(5,7),16);
  c.fillStyle=base;c.fillRect(0,0,S,S);
  const bw=32,bh=16;
  for(let row=0;row<S/bh;row++) for(let col=0;col<S/bw+1;col++){
    const ox=row%2?bw/2:0,dv=(Math.random()-.5)*v;
    c.fillStyle=`rgb(${r+dv|0},${g2+dv|0},${b+dv|0})`;c.fillRect(col*bw-ox+1,row*bh+1,bw-2,bh-2);
  }
  c.fillStyle=`rgb(${r-22|0},${g2-22|0},${b-22|0})`;
  for(let i=0;i<=S/bh;i++) c.fillRect(0,i*bh,S,1);
  for(let i=0;i<=S/bw;i++) c.fillRect(i*bw,0,1,S);
  const t=new THREE.CanvasTexture(cv);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(3,4);return t;
}
function concTex(){
  const S=256,cv=document.createElement('canvas');cv.width=S;cv.height=S;
  const c=cv.getContext('2d');c.fillStyle='#161820';c.fillRect(0,0,S,S);
  for(let i=0;i<6000;i++){const x=Math.random()*S,y=Math.random()*S,v=(Math.random()-.5)*28;c.fillStyle=`rgba(${140+v|0},${140+v|0},${150+v|0},.09)`;c.fillRect(x,y,1,1);}
  const t=new THREE.CanvasTexture(cv);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(2,3);return t;
}
function roadTex(){
  const S=512,cv=document.createElement('canvas');cv.width=S;cv.height=S;
  const c=cv.getContext('2d');
  // Base más oscura con tono azulado para diferenciarse del cielo
  c.fillStyle='#0c0e14';c.fillRect(0,0,S,S);
  // Grain de asfalto
  for(let i=0;i<10000;i++){
    const x=Math.random()*S,y=Math.random()*S,v=Math.random()*18;
    c.fillStyle=`rgba(${v+5|0},${v+5|0},${v+9|0},.5)`;c.fillRect(x,y,1,1);
  }
  // Líneas de desgaste horizontales sutiles
  for(let i=0;i<12;i++){
    const y=Math.random()*S;
    c.fillStyle='rgba(255,255,255,.015)';
    c.fillRect(0,y,S,Math.random()*2+1);
  }
  // Manchas de aceite (círculos muy sutiles)
  for(let i=0;i<8;i++){
    const x=Math.random()*S,y=Math.random()*S,r=10+Math.random()*20;
    const g=c.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,'rgba(40,20,60,.12)');g.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=g;c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fill();
  }
  const t=new THREE.CanvasTexture(cv);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(10,10);return t;
}

      const ov=c.createLinearGradient(0,S*.68,0,S);

      c.strokeStyle=m.hex;c.lineWidth=8;c.shadowColor=m.hex;c.shadowBlur=22;c.strokeRect(4,4,S-8,S-8);c.shadowBlur=0;

// ── JOYSTICK SYSTEM ──────────────────────────────────────────────────────────
// Cada joystick es 100% independiente — listeners en su propio elemento
function makeJoystick(wrapEl, baseEl, knobEl, radius) {
  const R = radius || 48; // radio en px del canvas táctil
  const DEAD = 0.08;      // dead zone — ignora micro-movimientos
  const s = {x:0, y:0, rawX:0, rawY:0, active:false, tid:null, cx:0, cy:0};

  function start(e) {
    e.preventDefault(); e.stopPropagation();
    if(s.tid !== null) return;
    const t = e.changedTouches[0];
    const r = baseEl.getBoundingClientRect();
    s.tid    = t.identifier;
    s.active = true;
    s.cx = r.left + r.width/2;
    s.cy = r.top  + r.height/2;
    baseEl.classList.add('pressed');
  }

  function move(e) {
    e.preventDefault(); e.stopPropagation();
    for(const t of e.changedTouches) {
      if(t.identifier !== s.tid) continue;
      let dx = t.clientX - s.cx;
      let dy = t.clientY - s.cy;
      const dist = Math.hypot(dx, dy);
      const clamped = Math.min(dist, R);
      const ang = Math.atan2(dy, dx);
      const vx = Math.cos(ang) * clamped;
      const vy = Math.sin(ang) * clamped;
      // Visual knob
      knobEl.style.transform = `translate(calc(-50% + ${vx}px), calc(-50% + ${vy}px))`;
      // Normalize con dead zone
      const nx = vx/R, ny = vy/R;
      const mag = Math.hypot(nx,ny);
      if(mag < DEAD){ s.x=0; s.y=0; }
      else {
        // Remap [DEAD..1] -> [0..1] para respuesta más natural
        const scale = (mag-DEAD)/(1-DEAD);
        s.x = (nx/mag)*scale;
        s.y = (ny/mag)*scale;
      }
    }
  }

  function end(e) {
    for(const t of e.changedTouches) {
      if(t.identifier !== s.tid) continue;
      s.tid    = null;
      s.active = false;
      s.x = 0; s.y = 0;
      knobEl.style.transform = 'translate(-50%,-50%)';
      baseEl.classList.remove('pressed');
    }
  }

  // Listeners en el WRAP (zona más grande) para start, en BASE para move/end
  wrapEl.addEventListener('touchstart', start,  {passive:false});
  wrapEl.addEventListener('touchmove',  move,   {passive:false});
  wrapEl.addEventListener('touchend',   end,    {passive:true});
  wrapEl.addEventListener('touchcancel',end,    {passive:true});
  return s;
}

function toggleLike(){
  if(!currentMural) return;
  const key='mural_'+currentMural.id;
  const btn=document.getElementById('btn-like');
  const icon=document.getElementById('btn-like-icon');
  const cnt=document.getElementById('btn-like-count');
  if(localLikes[key]){
    delete localLikes[key];
    btn.classList.remove('liked');
    icon.textContent='🤍';
    cnt.textContent=Math.max(0,(parseInt(cnt.textContent)||1)-1);

    setTimeout(()=>{icon.style.transform='';},200);

const mmC=document.getElementById('mm'),mmX=mmC.getContext('2d');
const MM=96,WD=80;
function drawMinimap(){
  mmX.clearRect(0,0,MM,MM);mmX.fillStyle='#0a0a12';mmX.fillRect(0,0,MM,MM);
  const s=MM/WD,ox=WD/2;
  // Calles (más claras para diferenciarse del fondo)
  [-22,0,22].forEach(x=>{mmX.fillStyle='#1e2235';mmX.fillRect((x+ox-1.5)*s,0,3*s,MM);});
  [-22,0,22].forEach(z=>{mmX.fillStyle='#1e2235';mmX.fillRect(0,(z+ox-1.5)*s,MM,3*s);});
  // Intersecciones
  [-22,0,22].forEach(x=>[-22,0,22].forEach(z=>{mmX.fillStyle='#252840';mmX.fillRect((x+ox-1.5)*s,(z+ox-1.5)*s,3*s,3*s);}));
  // Bloques de edificios
  BCX.forEach(bx=>BCZ.forEach(bz=>{
    mmX.fillStyle='#2a2d42';mmX.fillRect((bx+ox-6)*s,(bz+ox-6)*s,12*s,12*s);
    mmX.fillStyle='#22243a';mmX.fillRect((bx+ox-5.5)*s,(bz+ox-5.5)*s,11*s,11*s);
  }));
  // Murales — punto más grande con glow visual
  muralZones.forEach(mz=>{
    const visited = seen.has(mz.mural.id);
    const mx=(mz.pos.x+ox)*s, mz2=(mz.pos.z+ox)*s;
    if(visited){
      mmX.beginPath();mmX.arc(mx,mz2,5,0,Math.PI*2);
      mmX.fillStyle=mz.mural.hex+'44';mmX.fill();
    }
    mmX.beginPath();mmX.arc(mx,mz2,visited?3:2.5,0,Math.PI*2);
    mmX.fillStyle=visited?mz.mural.hex:'#44465a';mmX.fill();
  });
  // Avatar — más visible
  const ax=(avatar.position.x+ox)*s,az=(avatar.position.z+ox)*s;
  // Halo
  mmX.beginPath();mmX.arc(ax,az,6,0,Math.PI*2);
  mmX.fillStyle='#e8321f22';mmX.fill();
  // Punto
  mmX.beginPath();mmX.arc(ax,az,3.5,0,Math.PI*2);
  mmX.fillStyle='#e8321f';mmX.fill();
  // Flecha de dirección
  mmX.save();mmX.translate(ax,az);mmX.rotate(-avatarFacing);
  mmX.beginPath();mmX.moveTo(0,-8);mmX.lineTo(2.5,-3);mmX.lineTo(-2.5,-3);mmX.closePath();
  mmX.fillStyle='#e8321f';mmX.fill();mmX.restore();
}


const clock=new THREE.Clock();
let walkT=0,avatarFacing=0,targetFacing=0;

function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(clock.getDelta(),.05);
  // Camera joy
  const CS=1.4;
  if(cj.active||Math.abs(cj.x)>.04||Math.abs(cj.y)>.04){
    camYaw-=cj.x*CS*dt;
    camPitch=Math.max(-.05,Math.min(.9,camPitch-cj.y*CS*dt));
  }
  // Move
  const fwd=new THREE.Vector3(-Math.sin(camYaw),0,-Math.cos(camYaw));
  const right=new THREE.Vector3(Math.cos(camYaw),0,-Math.sin(camYaw));
  let mx=0,mz=0;
  if(keys['ArrowUp']||keys['w']||keys['W']){mx+=fwd.x;mz+=fwd.z;}
  if(keys['ArrowDown']||keys['s']||keys['S']){mx-=fwd.x;mz-=fwd.z;}
  if(keys['ArrowLeft']||keys['a']||keys['A']){mx-=right.x;mz-=right.z;}
  if(keys['ArrowRight']||keys['d']||keys['D']){mx+=right.x;mz+=right.z;}
  if(joy.active||Math.abs(joy.x)>.04||Math.abs(joy.y)>.04){mx+=fwd.x*(-joy.y)+right.x*joy.x;mz+=fwd.z*(-joy.y)+right.z*joy.x;}
  const SPEED=3.8,moving=Math.hypot(mx,mz)>.01;
  if(moving){
    const len=Math.hypot(mx,mz);mx/=len;mz/=len;
    const nx=avatar.position.x+mx*SPEED*dt,nz=avatar.position.z+mz*SPEED*dt;
    if(canMove(nx,avatar.position.z))avatar.position.x=nx;
    if(canMove(avatar.position.x,nz))avatar.position.z=nz;
    targetFacing=Math.atan2(mx,mz);walkT+=dt*5;
    // Animate legs + arms
    legL.rotation.x=Math.sin(walkT)*.58;legR.rotation.x=-Math.sin(walkT)*.58;
    armL.rotation.x=-Math.sin(walkT)*.4;armR.rotation.x=Math.sin(walkT)*.4;
    avatar.position.y=Math.abs(Math.sin(walkT))*.05;
  }else{
    legL.rotation.x*=.82;legR.rotation.x*=.82;armL.rotation.x*=.82;armR.rotation.x*=.82;
    avatar.position.y*=.82;
  }
  let diff=targetFacing-avatarFacing;
  while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
  avatarFacing+=diff*.10;avatar.rotation.y=avatarFacing;
  // Camera
  const sinY=Math.sin(camYaw),cosY=Math.cos(camYaw);
  const sinP=Math.sin(camPitch*Math.PI*.5),cosP=Math.cos(camPitch*Math.PI*.5);
  camPos.x+=(avatar.position.x+sinY*cosP*camDist-camPos.x)*.08;
  camPos.y+=(avatar.position.y+sinP*camDist+1-camPos.y)*.08;
  camPos.z+=(avatar.position.z+cosY*cosP*camDist-camPos.z)*.08;
  camera.position.copy(camPos);
  lookAtPt.set(avatar.position.x,avatar.position.y+1.1,avatar.position.z);
  camera.lookAt(lookAtPt);
  checkProx();drawMinimap();
  renderer.render(scene,camera);
}

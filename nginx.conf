server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index btaj-3d-tour.html;
    charset utf-8;

    # Gzip para cargar más rápido en móvil
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 1000;

    # Cache de imágenes PNG (las ilustraciones)
    location ~* \.(png|jpg|jpeg|webp|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Cache del HTML — corto para poder actualizar
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Sin cache en desarrollo — comenta esto en producción
    # add_header Cache-Control "no-cache";

    # Seguridad básica
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Cualquier ruta sirve el HTML (SPA)
    location / {
        try_files $uri $uri/ /btaj-3d-tour.html;
    }
}
